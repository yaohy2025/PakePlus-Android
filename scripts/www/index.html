function applyFilters(){
  var ff=q('fFund').value,fl=q('fLevel').value,fs=q('fStable').value,ffv=q('fFundVal').value;

function isFav(x){return !!loadFavs()[getFavKey(x)]}
function toggleFav(x){

  var f=loadFavs();delete f[k];saveFavs(f);renderFavs();
  // 同步更新搜索结果表格中的星标
  if(q('ra').style.display!=='none'){applyFilters()}
})

q('btnF').addEventListener('click',function(){
  var fp=q('fp'),ra=q('ra');
  if(fp.classList.contains('show')){fp.className='fp';ra.style.display='block';q('resTitle').textContent='查询结果'}
  else{fp.className='fp show';ra.style.display='none';q('resTitle').textContent='查询结果';renderFavs()}
})
function exportFavs(){
  var f=loadFavs(),keys=Object.keys(f);
  if(!keys.length){alert('暂无收藏可导出');return}
  var BOM='\uFEFF';
  var csv=BOM+'DRG名称,DRG编码,基金类型,病组级别,次均费用,费用范围下限(0.7倍),费用范围上限(1.4倍),平均天数,病组状态\n';
  for(var i=0;i<keys.length;i++){
    var x=f[keys[i]],ft=x.fee;
    var row=[x.name,x.code,x.fund==310?'职工医保':'居民医保',x.level+'级'];
    row.push(ft!==null?Number(ft).toFixed(2):'');
    var lo=ft!==null?(ft*0.7).toFixed(2):'';
    var hi=ft!==null?(ft*1.4).toFixed(2):'';
    row.push(lo,hi);
    row.push(x.days!==null?Number(x.days).toFixed(2):'');
    row.push(x.stable);
    csv+=row.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"'}).join(',')+'\n';
  }
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='DRG收藏导出_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href)},100);
}
q('btnExp').addEventListener('click',exportFavs);
</script></body></html>
